name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # paper companion: pin a single version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        # The `exclude` in `[tool.mypy]` (see `pyproject.toml`) is equivalent
        # to enumerating every module explicitly, so newly added modules do
        # not require updating CI.
        run: mypy .

      - name: Run pytest
        run: pytest tests/ -v

      - name: Verify modeling assumptions
        run: python verify_assumptions.py
